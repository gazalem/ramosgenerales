<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examen de Seguros</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Sticky Header -->
  <div class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3">
      <div class="flex items-center gap-4 flex-1 flex-wrap">
        <span class="text-sm font-medium text-gray-600">
          Respondidas: <span id="stat-answered" class="font-bold text-gray-800">0</span>/<span id="stat-total">0</span>
        </span>
        <span class="flex items-center gap-1 text-sm font-medium text-green-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Correctas: <span id="stat-correct" class="font-bold">0</span>
        </span>
        <span class="flex items-center gap-1 text-sm font-medium text-red-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          Incorrectas: <span id="stat-wrong" class="font-bold">0</span>
        </span>
        <span id="score-badge" class="text-sm font-bold px-3 py-1 rounded-full bg-gray-100 text-gray-600">0%</span>
      </div>
      <div class="flex gap-2">
        <button onclick="shuffleExam()" class="px-4 py-2 text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-sm transition">
          🔀 Mezclar
        </button>
        <button onclick="resetExam()" class="px-4 py-2 text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg shadow-sm transition">
          🔄 Reiniciar
        </button>
      </div>
    </div>
    <div class="h-1.5 bg-gray-100">
      <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width:0%"></div>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-4 py-6 space-y-5" id="questions-container"></main>

  <footer class="max-w-3xl mx-auto px-4 py-8 text-center text-sm text-gray-400">
    Examen de Seguros · Panamá 2025
  </footer>

<script>
let _sourceData = [];


let currentQuestions = [];
let state = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(source) {
  return source.map((q, idx) => {
    const indices = shuffle(q.options.map((_, i) => i));
    return {
      id: idx,
      question: q.question,
      options: indices.map(i => q.options[i]),
      correct: indices.indexOf(q.correct)
    };
  });
}

function shuffleExam() {
  currentQuestions = buildQuestions(shuffle(_sourceData));
  state = {};
  renderAll();
  updateStats();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetExam() {
  state = {};
  renderAll();
  updateStats();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function answerQuestion(qIdx, optIdx) {
  if (state[qIdx] !== undefined) return;
  state[qIdx] = optIdx;
  renderQuestion(qIdx);
  updateStats();
}

function updateStats() {
  const total = currentQuestions.length;
  const answered = Object.keys(state).length;
  let correct = 0;
  for (const [k, v] of Object.entries(state)) {
    if (currentQuestions[k].correct === v) correct++;
  }
  const wrong = answered - correct;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;

  const badge = document.getElementById('score-badge');
  badge.textContent = pct + '%';
  if (answered === 0) { badge.className = 'text-sm font-bold px-3 py-1 rounded-full bg-gray-100 text-gray-600'; }
  else if (pct >= 70) { badge.className = 'text-sm font-bold px-3 py-1 rounded-full bg-green-100 text-green-800'; }
  else if (pct >= 50) { badge.className = 'text-sm font-bold px-3 py-1 rounded-full bg-yellow-100 text-yellow-800'; }
  else { badge.className = 'text-sm font-bold px-3 py-1 rounded-full bg-red-100 text-red-700'; }

  document.getElementById('progress-bar').style.width = (answered / total * 100) + '%';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderQuestion(qIdx) {
  const q = currentQuestions[qIdx];
  const card = document.getElementById('q-' + qIdx);
  if (!card) return;
  const chosen = state[qIdx];
  const answered = chosen !== undefined;

  const optsEl = card.querySelector('.options-list');
  optsEl.innerHTML = '';

  q.options.forEach((opt, oIdx) => {
    const isCorrect = oIdx === q.correct;
    const isChosen = chosen === oIdx;

    let cls = 'w-full text-left px-4 py-3 rounded-lg border-2 text-sm font-medium transition-colors ';
    if (!answered) {
      cls += 'border-gray-200 bg-white hover:border-indigo-400 hover:bg-indigo-50 text-gray-800 cursor-pointer';
    } else if (isCorrect) {
      cls += 'border-green-500 bg-green-50 text-green-800';
    } else if (isChosen) {
      cls += 'border-red-400 bg-red-50 text-red-700';
    } else {
      cls += 'border-gray-100 bg-gray-50 text-gray-400';
    }

    const btn = document.createElement('button');
    btn.className = cls;
    btn.disabled = answered;
    if (!answered) btn.onclick = () => answerQuestion(qIdx, oIdx);

    let icon = '';
    if (answered && isCorrect) icon = '<span class="mr-2">✓</span>';
    else if (answered && isChosen) icon = '<span class="mr-2">✗</span>';

    btn.innerHTML = icon + esc(opt);
    optsEl.appendChild(btn);
  });

  if (answered) {
    card.classList.remove('border-gray-200','border-green-400','border-red-300');
    card.classList.add(q.correct === chosen ? 'border-green-400' : 'border-red-300');
  }
}

function renderAll() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  currentQuestions.forEach((q, qIdx) => {
    const isTF = q.options.length === 2 && q.options.every(o => ['Sí','No','SI','NO'].includes(o));
    const badge = isTF
      ? '<span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">V/F</span>'
      : '<span class="text-xs font-semibold bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">Múltiple</span>';

    const card = document.createElement('div');
    card.id = 'q-' + qIdx;
    card.className = 'bg-white rounded-xl border-2 border-gray-200 shadow-sm p-5';
    card.innerHTML = `
      <div class="flex items-start gap-2 mb-4">
        <span class="text-indigo-600 font-bold text-sm shrink-0 mt-0.5">${qIdx + 1}.</span>
        <div class="flex-1">
          <p class="text-gray-800 font-semibold text-sm leading-relaxed">${esc(q.question)}</p>
          <div class="mt-1">${badge}</div>
        </div>
      </div>
      <div class="options-list space-y-2"></div>
    `;
    container.appendChild(card);
    renderQuestion(qIdx);
  });
}

// Init
fetch('questions.json')
  .then(r => r.json())
  .then(data => {
    _sourceData = data;
    currentQuestions = buildQuestions(data);
    renderAll();
    updateStats();
  });
</script>
</body>
</html>
